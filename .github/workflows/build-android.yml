name: Build Web (PWA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (Vite → client/dist)
        env:
          NODE_ENV: production
          VITE_API_BASE: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Show output
        run: |
          echo "---- client/dist ----"
          ls -la client/dist || true
          echo "---------------------"

